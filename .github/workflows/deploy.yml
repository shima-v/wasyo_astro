name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Build Astro
        run: pnpm run build
        env:
          # 本番(prod)の公開設定。GAS の prod /exec URL は repo secret で注入する。
          # 秘密情報（LINEトークン/HMAC）は GAS の Script Properties 側にのみ置き、ここには置かない。
          PUBLIC_ENV: production            # 本番。dev 限定の開発バッジ/タブ【開発】は出さない
          PUBLIC_RESERVE_API: ${{ secrets.PROD_RESERVE_API }}
          # LINE Login（任意）。両方が揃ったときだけフロントの「LINEで連携」が有効化される。
          # REDIRECT は LINE コンソールのコールバックURLと完全一致（末尾スラッシュ・www有無まで）させること。
          PUBLIC_LINE_LOGIN_CHANNEL_ID: ${{ secrets.PROD_LINE_LOGIN_CHANNEL_ID }}
          PUBLIC_LINE_LOGIN_REDIRECT: ${{ secrets.PROD_LINE_LOGIN_REDIRECT }}
          PUBLIC_SITE_URL: https://www.wwwasyo.com

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4